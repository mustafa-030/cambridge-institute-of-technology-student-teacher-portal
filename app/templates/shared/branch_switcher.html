<!-- shared/branch_switcher.html — include in any admin page -->
<div class="branch-switcher">
  <span class="branch-label">🏛️ Viewing:</span>
  <form method="POST" action="{{ url_for('admin.switch_branch') }}" style="display:inline;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="next" value="{{ request.path }}">
    <button name="dept_id" value="" type="submit"
            class="branch-btn {% if not viewing_dept %}active{% endif %}">All Branches</button>
    {% for d in all_depts %}
    <button name="dept_id" value="{{ d.id }}" type="submit"
            class="branch-btn {% if viewing_dept and viewing_dept.id == d.id %}active{% endif %}">
      {{ d.code }}
    </button>
    {% endfor %}
  </form>
</div>

<style>
.branch-switcher {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--blue-50); border: 1.5px solid var(--blue-200);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
}
.branch-label { font-size: 12px; font-weight: 700; color: var(--blue-700); white-space: nowrap; }
.branch-btn {
  padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--blue-300);
  background: var(--white); color: var(--blue-600); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.branch-btn:hover  { background: var(--blue-100); }
.branch-btn.active { background: var(--blue-600); color: var(--white); border-color: var(--blue-600); }
</style>
